name: mindflex
description: MindFlex - The High-Performance Neural Sanctuary
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  fl_chart: ^0.68.0
  animate_do: ^3.3.4
  percent_indicator: ^4.2.3
  supabase_flutter: ^2.12.4
  flutter_dotenv: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/

flutter_launcher_icons:
  image_path: "assets/MindFlex_icon.png"
  ios: true
  android: true
  windows:
    generate: true
  macos:
    generate: true
  linux:
    generate: true
  web:
    generate: true
    background_color: "#ffffff"
    image_path: "assets/MindFlex_icon.png"
